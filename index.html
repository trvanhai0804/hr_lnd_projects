<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shival Page</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="ripple-layer"></div>
    
    <audio id="waterSound">
        <source src="./music/water.mp3" type="audio/mpeg">
    </audio>

    <header>
        <img src="images/shival_logo.png" class="logo-img" alt="Logo Image">

        <nav>
            <a href="#">Home</a>
            <a href="#">About Me</a>
            <a href="#">Services</a>
            <a href="#">Portfolio</a>
            <a href="#">Contact</a>
        </nav>

        <button class="btn">Connect With Me</button>
    </header>

    <section class="hero">

        <img src="images/profile.jpg" class="profile-img" alt="Profile Image">

        <h1>
            Hey,
        </h1>
        <h1>
            <span class="gradient-text">Shival</span> here.
        </h1>

        <p>
            Just a guy with a little knowledge of data analysis, an eagerness to learn new things, and a desire to explore the unknown.
        </p>

        <div class="hero-buttons">
            <button class="btn">Connect with me</button>
            <button class="outline-btn">My Resume</button>
        </div>

    </section>

    <script>
    const rippleLayer = document.querySelector(".ripple-layer");
    const waterSound = document.getElementById("waterSound");
    
    document.addEventListener("click", function(e){
        const ripple = document.createElement("span");
        ripple.className = "ripple";
    
        ripple.style.left = e.clientX + "px";
        ripple.style.top = e.clientY + "px";
    
        rippleLayer.appendChild(ripple);
    
        waterSound.currentTime = 0;
        waterSound.play();
    
        setTimeout(() => {
            ripple.remove();
        }, 1200);
    });
    </script>

</body>
</html>
