<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Start Screen -->
    <section class="card" id="startCard">
        <h1>🎁 Surprise!</h1>
        <p>Someone has prepared a special birthday surprise for you.</p>
        <button id="startButton">Click To Open 🎂</button>
    </section>

    <!-- Birthday Main Card -->
    <section class="card hidden" id="birthdayCard">
        <h1 id="birthdayTitle">🎉 Happy Birthday! 🎉</h1>
        <div class="name" id="birthdayName">Shival</div>
        <img class="birthday-photo" id="birthdayPhoto" src="" alt="Birthday Photo">

        <div id="birthdayMessages"></div>
    </section>

    <!-- Message shown after user clicks gifts / bubbles -->
    <div id="giftMessage" class="hidden">Click the floating surprises 🎁</div>

    <!-- JS files: config first, app second -->
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
